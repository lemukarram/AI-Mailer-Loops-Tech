version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aimailsaas_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=aimailsaas
      - DB_USER=root
      - DB_PASS=root_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: aimailsaas_db
    restart: always
    environment:
      MYSQL_DATABASE: aimailsaas
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: aimailsaas_pma
    links:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1

volumes:
  db_data:
